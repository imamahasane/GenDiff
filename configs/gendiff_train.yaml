seed: 42
run_name: gendiff
device: cuda
num_workers: 4
amp: true
output_dir: runs

data:
  root: /path/to/processed_data
  train_split: train
  val_split: val
  test_split: test
  anatomy_map:
    abdomen: 0
    chest: 1
    head: 2
  hu_min: -1024.0
  hu_max: 1024.0

operator:
  type: matrix
  normalize: false

model:
  in_channels: 1
  out_channels: 1
  base_channels: 64
  channel_mults: [1, 2, 4, 8]
  num_res_blocks: 2
  embedding_dim: 128
  time_embedding_dim: 128
  num_diffusion_steps: 20
  attention_resolutions: [16, 32]
  dropout: 0.0

train:
  batch_size: 4
  epochs: 100
  lr: 2.0e-4
  encoder_lr: 1.0e-5
  weight_decay: 1.0e-4
  grad_clip_norm: 1.0
  cosine_min_lr: 1.0e-6
  lambda_img: 1.0
  lambda_phys: 0.1
  lambda_grad: 0.5
  freeze_encoder: false
  deterministic: true
  checkpoint_metric: psnr
  checkpoint_mode: max
